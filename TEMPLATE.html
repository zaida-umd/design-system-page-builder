<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{PAGE_TITLE}} — {{SITE_NAME}} | University of Maryland</title>

  <!-- ============================================================
       UMD Critical CSS — MUST precede cdn.js
       If cdn.js loads first, elements upgrade before :defined rules
       exist and container-type never gets set.
       Load order: inline <style> → <script> cdn.js → </head>

       SOURCE OF TRUTH: styles/critical.css
       This <style> block is a verbatim copy of styles/critical.css.
       When updating CSS rules, edit styles/critical.css first, then
       copy the changes here. See REQUIRED-CSS.md for explanations
       of what each rule does and why.
  ============================================================ -->
  <style>
    /* ====================
       GROUP 1: container-type: normal
       These components use grid-auto-flow / internal layout that
       breaks under inline-size containment. Do NOT move to GROUP 2.
    ==================== */
    umd-element-navigation-utility:not(:defined),
    umd-element-utility-header:not(:defined),
    umd-element-navigation-header:not(:defined),
    umd-element-nav-item:not(:defined),
    umd-element-call-to-action:not(:defined) {
      content-visibility: hidden;
    }
    umd-element-navigation-utility,
    umd-element-utility-header,
    umd-element-navigation-header,
    umd-element-nav-item,
    umd-element-call-to-action {
      display: block;
      container-type: normal;
    }

    /* ====================
       GROUP 2: container-type: inline-size
       These components use shadow DOM @container queries that fire
       against the host element. Without inline-size on the host,
       two-column layouts collapse to stacked.
    ==================== */
    umd-element-hero:not(:defined),
    umd-element-hero-minimal:not(:defined),
    umd-element-hero-expand:not(:defined),
    umd-element-hero-logo:not(:defined),
    umd-element-hero-grid:not(:defined),
    umd-element-hero-brand-video:not(:defined),
    umd-element-pathway:not(:defined),
    umd-element-pathway-highlight:not(:defined),
    umd-element-section-intro:not(:defined),
    umd-element-section-intro-wide:not(:defined),
    umd-element-card:not(:defined),
    umd-element-card-overlay:not(:defined),
    umd-element-card-icon:not(:defined),
    umd-element-card-video:not(:defined),
    umd-element-quote:not(:defined),
    umd-element-stat:not(:defined),
    umd-element-person-bio:not(:defined),
    umd-element-accordion-item:not(:defined),
    umd-element-nav-slider:not(:defined),
    umd-element-media-inline:not(:defined),
    umd-element-breadcrumb:not(:defined),
    umd-element-footer:not(:defined) {
      content-visibility: hidden;
    }
    umd-element-hero,
    umd-element-hero-minimal,
    umd-element-hero-expand,
    umd-element-hero-logo,
    umd-element-hero-grid,
    umd-element-hero-brand-video,
    umd-element-pathway,
    umd-element-pathway-highlight,
    umd-element-section-intro,
    umd-element-section-intro-wide,
    umd-element-card,
    umd-element-card-overlay,
    umd-element-card-icon,
    umd-element-card-video,
    umd-element-quote,
    umd-element-stat,
    umd-element-person-bio,
    umd-element-accordion-item,
    umd-element-nav-slider,
    umd-element-media-inline,
    umd-element-breadcrumb,
    umd-element-footer {
      display: block;
      container-type: inline-size;
    }
    umd-element-breadcrumb:defined {
      margin-top: 16px;
    }

    /* ====================
       GROUP 3: Full-bleed components
       umd-layout-image-expand collapses to content width without
       explicit width: 100%. Do NOT wrap in a horizontal spacing class.
       Do NOT set max-width on host — shadow DOM applies 1600px internally.
       Content slot text must be explicitly white (color:white) —
       the component has no data-theme support. See RULES.md §17.
    ==================== */
    umd-layout-image-expand:not(:defined) {
      content-visibility: hidden;
    }
    umd-layout-image-expand {
      display: block;
      container-type: inline-size;
      width: 100%;
    }

    /* ====================
       FONTS
       Interstate is licensed. These declarations set the stack but
       do NOT embed the font. Without @font-face, falls back to
       Helvetica/Arial. Layouts and sizing are unaffected.
    ==================== */
    :root {
      font-family: "Interstate", Helvetica, Arial, Verdana, sans-serif;
    }
    p, li, label, input, textarea, select {
      font-family: "Interstate", Helvetica, Arial, Verdana, sans-serif;
    }

    /* ====================
       VERTICAL SPACING — between sections and items
    ==================== */

    /* Landing page — between sections */
    .umd-layout-vertical-landing           { margin-bottom: 56px; }
    @media (min-width: 768px)  { .umd-layout-vertical-landing  { margin-bottom: 80px; } }
    @media (min-width: 1024px) { .umd-layout-vertical-landing  { margin-bottom: 120px; } }

    /* Landing page — between items within a section */
    .umd-layout-vertical-landing-child     { margin-bottom: 32px; }
    @media (min-width: 768px)  { .umd-layout-vertical-landing-child { margin-bottom: 40px; } }
    @media (min-width: 1024px) { .umd-layout-vertical-landing-child { margin-bottom: 48px; } }

    /* Interior page — page content area margins (both class names work) */
    .umd-layout-space-vertical-interior,
    .umd-layout-vertical-interior          { margin-bottom: 56px; }
    @media (min-width: 1024px) {
      .umd-layout-space-vertical-interior,
      .umd-layout-vertical-interior        { margin-bottom: 80px; }
    }

    /* Interior page — between items within a section */
    .umd-layout-space-vertical-interior-child,
    .umd-layout-vertical-interior-child    { margin-bottom: 32px; }

    /* Headline bottom spacing — above a content grid */
    .umd-layout-space-vertical-headline-large { margin-bottom: 16px; }
    @media (min-width: 1024px) {
      .umd-layout-space-vertical-headline-large { margin-bottom: 24px; }
    }

    /* ====================
       HORIZONTAL SPACING — page-lock classes
    ==================== */
    [class^="umd-layout-space-horizontal-"] {
      box-sizing: border-box;
      display: block;
      margin-left: auto;
      margin-right: auto;
      padding-left: 24px;
      padding-right: 24px;
    }
    @media (min-width: 768px) {
      [class^="umd-layout-space-horizontal-"] {
        padding-left: 48px;
        padding-right: 48px;
      }
    }
    @media (min-width: 1200px) {
      [class^="umd-layout-space-horizontal-"] {
        padding-left: 64px;
        padding-right: 64px;
      }
    }
    .umd-layout-space-horizontal-full     { max-width: 100%;   }
    .umd-layout-space-horizontal-larger   { max-width: 1600px; }
    .umd-layout-space-horizontal-large    { max-width: 1400px; }
    .umd-layout-space-horizontal-normal   { max-width: 1280px; }
    .umd-layout-space-horizontal-small    { max-width: 992px;  }
    .umd-layout-space-horizontal-smallest { max-width: 800px;  }

    /* ====================
       WATERMARK DECORATION
    ==================== */
    :is(.umd-text-decoration-watermark, .umd-watermark, .umd-watermark-dark) > * {
      position: absolute;
      top: 20px;
      left: -2%;
      color: #f1f1f1;
      font-weight: 700;
      text-transform: uppercase;
      font-size: min(calc(44px + 13vw), 240px);
      line-height: 0;
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
    }
    :is(.umd-text-decoration-watermark, .umd-watermark):not(.umd-watermark-dark) > * {
      opacity: 0.6;
      z-index: -1;
    }
    .umd-watermark-dark > * {
      opacity: 0.12;
      z-index: inherit;
    }
    @keyframes slide-in-from-left {
      from { transform: translate(-15vw); }
      to   { transform: translate(0); }
    }
    @media (prefers-reduced-motion: no-preference) {
      @supports (animation-timeline: scroll()) {
        :is(.umd-text-decoration-watermark, .umd-watermark, .umd-watermark-dark) > * {
          animation: slide-in-from-left forwards;
          animation-timeline: view();
          animation-range-start: 0;
          animation-range-end: 100vh;
          transform: translate(-15vw);
        }
      }
    }

    /* ====================
       SECTION-INTRO-WIDE WRAPPER
       Required when .umd-layout-space-horizontal-larger wraps
       umd-element-section-intro-wide
    ==================== */
    .umd-layout-space-horizontal-larger {
      position: relative;
      container-type: inline-size;
      isolation: isolate;
    }

    /* ====================
       GRID UTILITIES
    ==================== */
    @media (min-width: 768px) {
      .umd-layout-grid-child-fill-height,
      .umd-layout-grid-child-fill-height > * {
        height: 100%;
      }
    }

    /* ====================
       LAYOUT PATTERNS — grids, dark sections, alignment
       Source: @universityofmaryland/web-styles-library
    ==================== */

    /* Two-column grid — stacks mobile, 2 columns at 650px+ */
    .umd-layout-grid-gap-two {
      display: grid;
    }
    @media (min-width: 650px) {
      .umd-layout-grid-gap-two {
        grid-template-columns: repeat(2, 1fr);
        gap: 32px;
      }
    }
    @media (min-width: 1024px) {
      .umd-layout-grid-gap-two { gap: 40px; }
    }

    /* Inline CTA row — stacks mobile, flex row at 650px+ */
    .umd-layout-grid-inline-tablet-rows {
      align-items: flex-start;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    @media (min-width: 650px) {
      .umd-layout-grid-inline-tablet-rows {
        flex-direction: row;
        flex-wrap: wrap;
        align-items: center;
      }
    }

    /* Full-width dark section with responsive padding */
    .umd-layout-background-full-dark {
      background-color: #000000;
      padding: 48px 0;
    }
    @media (min-width: 768px) {
      .umd-layout-background-full-dark { padding: 80px 0; }
    }
    @media (min-width: 1200px) {
      .umd-layout-background-full-dark { padding: 104px 0; }
    }

    /* Stacked figure content — for <figure> inside rich text */
    .umd-layout-alignment-block-stacked {
      display: flex;
      flex-direction: column;
    }
    .umd-layout-alignment-block-stacked > * { margin-top: 16px; }
    .umd-layout-alignment-block-stacked > *:first-child { margin-top: 0; }

    /* Single-column stacked grid (sticky columns static slot) */
    .umd-layout-grid-gap-stacked {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }
    @media (min-width: 1024px) {
      .umd-layout-grid-gap-stacked { gap: 40px; }
    }

    /* ====================
       TYPOGRAPHY — inline headlines and color utilities
       Used inside umd-text-rich-advanced for in-content headlines.
       Apply to <p> elements, not heading tags.
    ==================== */
    .umd-sans-large {
      font-family: "Interstate", Helvetica, Arial, Verdana, sans-serif;
      font-weight: 700;
      font-size: 18px;
      line-height: 1.25em;
    }

    .umd-sans-larger-bold {
      font-family: Interstate, Helvetica, Arial, Verdana, sans-serif;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.4em;
      text-wrap: pretty;
    }
    @media (min-width: 650px) {
      .umd-sans-larger-bold { font-size: calc(18px + .5vw); }
    }
    @media (min-width: 1024px) {
      .umd-sans-larger-bold { font-size: 22px; line-height: 1.25em; }
    }

    .umd-sans-extralarge-bold {
      font-family: "Interstate", Helvetica, Arial, Verdana, sans-serif;
      font-weight: 700;
      font-size: 18px;
      line-height: 1.25em;
      text-wrap: pretty;
    }
    @media (min-width: 650px) {
      .umd-sans-extralarge-bold { font-size: calc(18px + 1.16vw); }
    }
    @media (min-width: 1024px) {
      .umd-sans-extralarge-bold { font-size: 32px; line-height: 1.125em; }
    }

    .umd-sans-largest-uppercase {
      font-family: "Interstate", Helvetica, Arial, Verdana, sans-serif;
      font-weight: 800;
      text-transform: uppercase;
      font-size: 32px;
      line-height: 1.1em;
    }
    @media (min-width: 768px)  { .umd-sans-largest-uppercase { font-size: 40px; } }
    @media (min-width: 1024px) { .umd-sans-largest-uppercase { font-size: 44px; } }

    /* Color utilities */
    .text-black { color: #000; }
    .text-white { color: #ffffff; }

    /* ====================
       RICH TEXT ADVANCED — editorial body copy
       Light and dark variants. 18px/1.5em with link hover styles.
    ==================== */

    /* Light variant */
    .umd-text-rich-advanced {
      font-size: 18px;
      line-height: 1.5em;
    }
    .umd-text-rich-advanced * {
      color: #454545;
    }
    .umd-text-rich-advanced > * {
      font-size: 18px;
      margin-top: 24px;
    }
    .umd-text-rich-advanced > *:first-child {
      margin-top: 0;
    }
    .umd-text-rich-advanced a {
      color: #000000;
      background-image: linear-gradient(#000000, #000000);
      position: relative;
      background-position: left calc(100% - 1px);
      background-repeat: no-repeat;
      background-size: 100% 1px;
      transition: color 0.5s, background-size 0.5s, background-image 0.5s, background-position 0.5s;
    }
    .umd-text-rich-advanced a:hover,
    .umd-text-rich-advanced a:focus {
      background-image: linear-gradient(#E21833, #E21833);
    }

    /* Dark variant */
    .umd-text-rich-advanced-dark {
      font-size: 18px;
      line-height: 1.5em;
    }
    .umd-text-rich-advanced-dark p,
    .umd-text-rich-advanced-dark li { color: #ffffff; }
    .umd-text-rich-advanced-dark a {
      color: #ffffff;
      background-image: linear-gradient(#ffffff, #ffffff);
      position: relative;
      background-position: left calc(100% - 1px);
      background-repeat: no-repeat;
      background-size: 100% 1px;
      transition: color 0.5s, background-size 0.5s, background-image 0.5s, background-position 0.5s;
    }
    .umd-text-rich-advanced-dark a:hover,
    .umd-text-rich-advanced-dark a:focus {
      background-image: linear-gradient(#FFD200, #FFD200);
    }

    /* ====================
       INTERIOR PAGE LAYOUT
       Sidebar + content column. Not in cdn.js — must be local.
    ==================== */
    @media (min-width: 768px) {
      .umd-layout-space-columns-left { display: flex; align-items: flex-start; }
      .umd-layout-space-columns-left > *:first-child { width: 242px; flex-shrink: 0; margin-right: 120px; }
      .umd-layout-space-columns-left > *:last-child { width: calc(100% - 242px); }
    }
    @media (max-width: 1023px) {
      .umd-layout-space-columns-left > *:first-child { display: none; }
    }

    /* Content column max-width (Tailwind utility) */
    .max-w-\[800px\] { max-width: 800px; }

    /* ====================
       IMAGE-EXPAND CONTENT UTILITIES
       Constrain and align the quote panel inside umd-layout-image-expand.
       Apply on div[slot="content"], not a child wrapper.
    ==================== */
    .max-w-\[480px\] { max-width: 480px; }
    .w-full          { width: 100%; }
    .block           { display: block; }
    .mr-auto         { margin-right: auto; }

    /* ====================
       STICKY COLUMNS UTILITIES
       Spacing tokens for slot content inside umd-element-sticky-columns.
    ==================== */
    .mb-md { margin-bottom: 24px; }
    .mb-sm { margin-bottom: 16px; }

    /* ====================
       UTILITY NAVIGATION LINKS
       ::slotted(*) only reaches div[slot="utility-navigation"], not
       the <a> children — these light-DOM styles fill the gap.
    ==================== */
    [slot="utility-navigation"] a {
      font-family: "Interstate", Helvetica, Arial, Verdana, sans-serif;
      font-size: 14px;
      color: #454545;
      text-decoration: none;
      line-height: 1.25;
    }
    [slot="utility-navigation"] a:hover,
    [slot="utility-navigation"] a:focus {
      color: #E21833;
      text-decoration: underline;
    }

    /* ====================
       MASONRY GRID (2-column stagger)
       Source: @universityofmaryland/web-styles-library — masonary.twoColumn
       Add min-height to direct children per use case.
    ==================== */
    .umd-layout-grid-masonry {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }
    @media (min-width: 768px) {
      .umd-layout-grid-masonry {
        grid-template-columns: 1fr 1fr;
        gap: 32px;
      }
    }
    @media (min-width: 1024px) {
      .umd-layout-grid-masonry { gap: 40px; }
    }
    .umd-layout-grid-masonry > * > * {
      width: 100%;
      height: 100%;
    }
    @media (min-width: 768px) {
      .umd-layout-grid-masonry > *:nth-of-type(odd)  { margin-top: -32px; margin-bottom: 32px; }
      .umd-layout-grid-masonry > *:nth-of-type(even) { margin-top: 0; }
      .umd-layout-grid-masonry > *:first-child        { margin-top: 0; }
      .umd-layout-grid-masonry > *:nth-of-type(2)    { margin-top: 32px; }
    }
    @media (min-width: 1024px) {
      .umd-layout-grid-masonry > *:nth-of-type(odd) { margin-top: -40px; margin-bottom: 40px; }
      .umd-layout-grid-masonry > *:nth-of-type(2)   { margin-top: 40px; }
    }
  </style>

  <script src="https://unpkg.com/@universityofmaryland/web-components-library@1.17.18/dist/cdn.js"></script>
</head>
<body>

  <!-- ========================================
       1. GLOBAL UNIVERSITY HEADER
       Hardcoded. Never modified. Zero config.
  ======================================== -->
  <umd-element-navigation-utility data-alert-off="true" role="navigation" aria-label="Utility navigation"></umd-element-navigation-utility>

  <umd-element-utility-header></umd-element-utility-header>

  <!-- ========================================
       2. SITE NAVIGATION HEADER
       Replace logo, nav items, and utility links.
  ======================================== -->
  <umd-element-navigation-header sticky class="umd-layout-space-horizontal-full">
    <a slot="logo" href="{{SITE_URL}}">
      <img src="{{LOGO_URL}}" alt="{{SITE_NAME}}" />
    </a>
    <nav slot="main-navigation">
      <!-- Repeat umd-element-nav-item for each top-level link -->
      <umd-element-nav-item>
        <a slot="primary-link" href="{{NAV_HREF}}">{{NAV_LABEL}}</a>
        <!-- Optional dropdown: add <a slot="sub-link"> children -->
      </umd-element-nav-item>
    </nav>
    <!-- Optional utility nav -->
    <!--
    <div slot="utility-navigation">
      <a href="/give">Give</a>
    </div>
    -->
  </umd-element-navigation-header>

  <!-- ========================================
       3. PAGE CONTENT
       Replace the sections below with actual content.
       Use umd-layout-vertical-landing on each <section>.
       Use umd-layout-space-horizontal-* wrappers for content width.
  ======================================== -->

  -->

        <umd-element-call-to-action data-display="secondary" slot="actions">
          <a href="{{LINK}}">{{LINK_TEXT}}</a>
        </umd-element-call-to-action>
      </umd-element-section-intro-wide>

  <!-- PATHWAY EXAMPLE (standard — requires dark wrapper) -->
  <!--
  <section class="umd-layout-vertical-landing" style="background: #000;">
    <umd-element-pathway data-theme="dark">
      <h2 slot="headline">{{HEADLINE}}</h2>

        <a href="{{CTA_URL}}">{{CTA_TEXT}}</a>
      </umd-element-call-to-action>
    </umd-element-pathway>
  </section>

  <!-- ========================================
       4. FOOTER
       Visual footer with campus background image.
       Default image: ../images/large/campus/footer-campus.jpg
  ======================================== -->
  <umd-element-footer data-display="visual">
    <a slot="logo" href="{{SITE_URL}}">
      <img src="../images/logos/footer-logo.svg" alt="{{SITE_NAME}}" />
    </a>
    <img slot="image" src="../images/large/campus/footer-campus.jpg" alt="" />
  </umd-element-footer>

</body>
